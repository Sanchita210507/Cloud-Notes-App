<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cloud Notes App</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

  <style>
    body {
      min-height:100vh;
      font-family:'DM Sans',sans-serif;
      background:linear-gradient(135deg,#0f1117,#1a1d2e);
      color:#eef0ff;
      display:flex;
      justify-content:center;
      padding:40px;
    }

    .app-card {
      width:100%;
      max-width:500px;
      background:rgba(255,255,255,0.05);
      padding:30px;
      border-radius:15px;
    }

    h1 {
      font-family:'Playfair Display';
      margin-bottom:10px;
    }

    .input-row {
      display:flex;
      gap:10px;
      margin:20px 0;
    }

    input {
      flex:1;
      padding:10px;
      border-radius:8px;
      border:none;
      outline:none;
      background:rgba(255,255,255,0.08);
      color:white;
    }

    button {
      background:#7b93ff;
      border:none;
      padding:10px 15px;
      border-radius:8px;
      color:white;
      cursor:pointer;
    }

    ul {
      list-style:none;
      padding:0;
    }

    li {
      background:rgba(255,255,255,0.08);
      padding:10px;
      border-radius:8px;
      margin-bottom:10px;
      cursor:pointer;
    }

    .completed {
      text-decoration:line-through;
      opacity:0.5;
    }
  </style>

</head>

<body>

<div class="app-card">
  <h1>☁️ Cloud Notes</h1>

  <div class="input-row">
    <input id="noteInput" placeholder="Write note...">
    <button onclick="saveNote()">Save</button>
  </div>

  <ul id="notesList"></ul>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyD5Q6OeoDXA0pW1__16mT5bLmvdRqt2_dQ",
  authDomain: "cloud-notes-app-59d1b.firebaseapp.com",
  databaseURL: "https://cloud-notes-app-59d1b-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "cloud-notes-app-59d1b",
  storageBucket: "cloud-notes-app-59d1b.firebasestorage.app",
  messagingSenderId: "636204312036",
  appId: "1:636204312036:web:ea03a67e961709e34ed3f1"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const notesRef = ref(db, "notes");

// ✅ Clean readable key (no random ID)
function generateKey(text) {
  return text.replace(/\s+/g, "_") + "_" + Date.now();
}

// Save note
window.saveNote = async function () {
  const input = document.getElementById("noteInput");
  const text = input.value.trim();

  if (!text) return;

  const key = generateKey(text);

  await set(ref(db, "notes/" + key), {
    text: text,
    completed: false,
    createdAt: Date.now()
  });

  input.value = "";
};

// Toggle complete
function toggleNote(key, current) {
  update(ref(db, "notes/" + key), {
    completed: !current
  });
}

// Display notes
onValue(notesRef, (snapshot) => {
  const list = document.getElementById("notesList");
  list.innerHTML = "";

  if (!snapshot.exists()) return;

  const data = [];

  snapshot.forEach(child => {
    data.push({ key: child.key, ...child.val() });
  });

  // Sort by time
  data.sort((a,b)=>a.createdAt-b.createdAt);

  data.forEach(note => {
    const li = document.createElement("li");
    li.textContent = note.text;

    if (note.completed) li.classList.add("completed");

    li.onclick = () => toggleNote(note.key, note.completed);

    list.appendChild(li);
  });
});
</script>

</body>
</html>
